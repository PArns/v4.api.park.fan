services:
  postgres:
    image: timescale/timescaledb:latest-pg18
    restart: unless-stopped
    # Postgres keeps parallel-query dynamic shared memory in /dev/shm. Docker's
    # 64MB default overflowed ("could not resize shared memory segment ... No space
    # left on device") once /predict began running its heavy 730-day rolling-window
    # queries concurrently. 512m gives the concurrent DSM segments room; the
    # per-gather cap bounds how many parallel workers any single query spawns.
    # (shared_preload_libraries=timescaledb stays in the data-dir postgresql.conf —
    # the -c flags here are additive, not a replacement.)
    shm_size: 512m
    command:
      - "postgres"
      - "-c"
      - "max_parallel_workers_per_gather=2"
    ports:
      - "${DB_PORT:-5433}:5432"
    environment:
      POSTGRES_USER: ${DB_USERNAME:-parkfan}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_DATABASE:-parkfan}
      POSTGRES_INITDB_ARGS: "-E UTF8"
    volumes:
      - /data/parkfan/postgres:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-parkfan} -d ${DB_DATABASE:-parkfan}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - parkfan-network
    labels:
      - "coolify.managed=true"
      - "coolify.version=1.0.0"
      - "coolify.type=database"

  redis:
    image: redis:8.4-alpine
    restart: unless-stopped
    volumes:
      - /data/parkfan/redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - parkfan-network
    command: >
      redis-server
      --appendonly yes
      --maxmemory 1gb
      --maxmemory-policy allkeys-lru
      --save ""
    labels:
      - "coolify.managed=true"
      - "coolify.version=1.0.0"
      - "coolify.type=cache"

  ml-service:
    build:
      context: ./ml-service
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DB_HOST: postgres
      DB_PORT: ${DB_PORT:-5432}
      DB_NAME: ${DB_DATABASE:-parkfan}
      DB_USER: ${DB_USERNAME:-parkfan}
      DB_PASSWORD: ${DB_PASSWORD}
      MODEL_DIR: ${MODEL_DIR:-/app/models}
      # 2 gunicorn workers (preload_app shares the import; the CatBoost model is only
      # ~12 MB so per-worker model cost is negligible — the old "~4 GiB / COW serving
      # floor" reasoning was wrong). The CPU-heavy path is TRAINING, which already
      # uses all 24 cores via CATBOOST_THREAD_COUNT=-1, so the host's multi-core
      # capacity is already exploited; inference is tiny (12 MB model, small batches)
      # and not throughput-bound at 2 workers. The historical OOM was never the model:
      # it was the never-evicting serving caches growing the workers to ~15 GiB, now
      # bounded by gunicorn max_requests recycling (see gunicorn.conf.py).
      # Bumping to 4 is env-overridable, but only after observing that recycling
      # actually holds per-worker memory low in prod — otherwise it eats the 06:00
      # training-window memory margin and risks the very OOM we're fixing.
      ML_WORKERS: ${ML_WORKERS:-2}
      # Set CATBOOST_TASK_TYPE=GPU in .env on hosts with an NVIDIA GPU (e.g. celestrial).
      # Defaults to CPU so the service still works on hosts without a GPU (dockerhost).
      CATBOOST_TASK_TYPE: ${CATBOOST_TASK_TYPE:-CPU}
      # Required by nvidia-container-runtime to inject GPU devices into the container.
      # "all" exposes all GPUs; set to "" on CPU-only hosts (no-op).
      NVIDIA_VISIBLE_DEVICES: ${NVIDIA_VISIBLE_DEVICES:-}
    volumes:
      - /data/parkfan/ml-models:/app/models
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - parkfan-network
    # GPU: set NVIDIA_VISIBLE_DEVICES in .env (e.g. "all") to expose the GPU.
    # Requires nvidia-container-toolkit on the host. No-op on CPU-only hosts.
    runtime: ${DOCKER_RUNTIME:-runc}
    # Budget: 2 recycled workers (~0.5-2g each between max_requests recycles)
    # ≈ up to ~4g serving + nightly training subprocess peak ~13g (Python/data ~5g +
    # CatBoost 8g limit) ≈ 17g, leaving ~3g margin under the 20g ceiling. More workers
    # eat that margin and have crashed the container during the 06:00 training window
    # before — keep workers low so training and serving coexist. The cgroup limit is
    # the hard stop: if training exceeds it, only the isolated training subprocess is
    # OOM-killed (it self-recovers), not the serving workers.
    mem_limit: 20g
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    labels:
      - "coolify.managed=true"
      - "coolify.version=1.0.0"
      - "coolify.type=service"

  nf-service:
    build:
      context: ./nf-service
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DB_HOST: postgres
      DB_PORT: ${DB_PORT:-5432}
      DB_NAME: ${DB_DATABASE:-parkfan}
      DB_USER: ${DB_USERNAME:-parkfan}
      DB_PASSWORD: ${DB_PASSWORD}
      MODEL_DIR: /app/models
      NF_PARK_IDS: ${NF_PARK_IDS:-}
      NVIDIA_VISIBLE_DEVICES: ${NVIDIA_VISIBLE_DEVICES:-}
    volumes:
      - /data/parkfan/nf-models:/app/models
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - parkfan-network
    # GPU: same DOCKER_RUNTIME env var as ml-service — set to "nvidia" on GPU hosts.
    runtime: ${DOCKER_RUNTIME:-runc}
    # PyTorch training is memory-heavy. 14g is the host-safe ceiling: host=28g,
    # ml-service ~8.5g + postgres ~5.3g committed → ~14g free, so a higher cap risks
    # a HOST OOM that would kill the API. Training the full ~2758-series panel needs
    # >10g at dataset build. NEVER trigger nf /train during ml-service's 06:00 cron
    # (its spike + this would exceed 28g).
    mem_limit: 14g
    # DataLoader workers pass batches via /dev/shm; Docker's 64 MB default gets a
    # SIGKILL (-9) on the worker shared-memory tensors. Give it real headroom.
    shm_size: 2gb
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    labels:
      - "coolify.managed=true"
      - "coolify.version=1.0.0"
      - "coolify.type=service"

  api:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - DB_HOST=postgres
      - REDIS_HOST=redis
      - ML_SERVICE_URL=http://ml-service:8000
      - NF_SERVICE_URL=http://nf-service:8000
      - NODE_ENV=production
      - NODE_OPTIONS=--max-old-space-size=4096
      # Always use volume path so .env cannot override with ./data/... (which is not mounted)
      - GEOIP_DATABASE_PATH=/app/geoip/GeoLite2-City.mmdb
      - GEOIP_MAXMIND_ACCOUNT_ID=${GEOIP_MAXMIND_ACCOUNT_ID}
      - GEOIP_MAXMIND_LICENSE_KEY=${GEOIP_MAXMIND_LICENSE_KEY}
    volumes:
      - /data/parkfan/geoip:/app/geoip
      - /data/parkfan/logs:/app/logs
    ports:
      - "${PORT:-3000}:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      ml-service:
        condition: service_healthy
    networks:
      - parkfan-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    labels:
      - "coolify.managed=true"
      - "coolify.version=1.0.0"
      - "coolify.type=application"
      - "coolify.healthcheck.enabled=true"
      - "coolify.healthcheck.path=/v1/health"
      - "coolify.healthcheck.port=3000"
      - "coolify.healthcheck.interval=30s"
      - "coolify.healthcheck.timeout=10s"
      - "coolify.healthcheck.retries=3"

  bull-board:
    image: venatum/bull-board:latest
    restart: unless-stopped
    ports:
      - "3001:3000"
    environment:
      REDIS_HOST: redis
      REDIS_PORT: ${REDIS_PORT:-6379}
      REDIS_DB: '0'
      REDIS_PASSWORD: ''
      REDIS_USE_TLS: 'false'
      REDIS_FAMILY: 4
      BULL_PREFIX: ${BULL_PREFIX:-parkfan}
      BULL_VERSION: BULL
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - parkfan-network
    labels:
      - "coolify.managed=true"
      - "coolify.version=1.0.0"
      - "coolify.type=monitoring"

networks:
  parkfan-network:
    driver: bridge
