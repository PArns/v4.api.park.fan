services:
  postgres:
    image: timescale/timescaledb:latest-pg18
    restart: unless-stopped
    # Postgres keeps parallel-query dynamic shared memory in /dev/shm. Docker's
    # 64MB default overflowed ("could not resize shared memory segment ... No space
    # left on device") once /predict began running its heavy 730-day rolling-window
    # queries concurrently. 512m gives the concurrent DSM segments room; the
    # per-gather cap bounds how many parallel workers any single query spawns.
    # (shared_preload_libraries=timescaledb stays in the data-dir postgresql.conf —
    # the -c flags here are additive, not a replacement.)
    shm_size: 512m
    command:
      - "postgres"
      - "-c"
      - "max_parallel_workers_per_gather=2"
    ports:
      - "${DB_PORT:-5433}:5432"
    environment:
      POSTGRES_USER: ${DB_USERNAME:-parkfan}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_DATABASE:-parkfan}
      POSTGRES_INITDB_ARGS: "-E UTF8"
    volumes:
      - /data/parkfan/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-parkfan} -d ${DB_DATABASE:-parkfan}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - parkfan-network
    labels:
      - "coolify.managed=true"
      - "coolify.version=1.0.0"
      - "coolify.type=database"

  redis:
    image: redis:8.4-alpine
    restart: unless-stopped
    volumes:
      - /data/parkfan/redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - parkfan-network
    command: >
      redis-server
      --appendonly yes
      --maxmemory 1gb
      --maxmemory-policy allkeys-lru
      --save ""
    labels:
      - "coolify.managed=true"
      - "coolify.version=1.0.0"
      - "coolify.type=cache"

  ml-service:
    build:
      context: ./ml-service
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DB_HOST: postgres
      DB_PORT: ${DB_PORT:-5432}
      DB_NAME: ${DB_DATABASE:-parkfan}
      DB_USER: ${DB_USERNAME:-parkfan}
      DB_PASSWORD: ${DB_PASSWORD}
      MODEL_DIR: ${MODEL_DIR:-/app/models}
      # 2 workers with gunicorn preload_app: the ~4 GiB model is loaded once in
      # the master and shared copy-on-write. Inference is read-only on model
      # weights → pages stay shared → serving floor stays near 1 copy (~4 GiB),
      # unlike 2 plain uvicorn workers that each load independently (~8.5 GiB).
      # The initial OOM on 2026-05-28 was caused by the deployment spike (postgres
      # container recreation + all services starting simultaneously), not
      # steady-state serving. With everything already running, 2 workers are safe.
      ML_WORKERS: "2"
    volumes:
      - /data/parkfan/ml-models:/app/models
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - parkfan-network
    # Budget: 1 worker ~4g + subprocess peak ~13g (Python/data ~5g + CatBoost 8g
    # limit) + headroom = 20g ceiling. 2-worker budget would be ~8.5g + 13g = 21.5g,
    # which exhausts the host once nf-service + API + postgres are accounted for.
    mem_limit: 20g
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    labels:
      - "coolify.managed=true"
      - "coolify.version=1.0.0"
      - "coolify.type=service"

  nf-service:
    build:
      context: ./nf-service
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DB_HOST: postgres
      DB_PORT: ${DB_PORT:-5432}
      DB_NAME: ${DB_DATABASE:-parkfan}
      DB_USER: ${DB_USERNAME:-parkfan}
      DB_PASSWORD: ${DB_PASSWORD}
      MODEL_DIR: /app/models
      NF_PARK_IDS: ${NF_PARK_IDS:-}
    volumes:
      - /data/parkfan/nf-models:/app/models
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - parkfan-network
    # PyTorch training is memory-heavy. 14g is the host-safe ceiling: host=28g,
    # ml-service ~8.5g + postgres ~5.3g committed → ~14g free, so a higher cap risks
    # a HOST OOM that would kill the API. Training the full ~2758-series panel needs
    # >10g at dataset build. NEVER trigger nf /train during ml-service's 06:00 cron
    # (its spike + this would exceed 28g).
    mem_limit: 14g
    # DataLoader workers pass batches via /dev/shm; Docker's 64 MB default gets a
    # SIGKILL (-9) on the worker shared-memory tensors. Give it real headroom.
    shm_size: 2gb
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    labels:
      - "coolify.managed=true"
      - "coolify.version=1.0.0"
      - "coolify.type=service"

  api:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - DB_HOST=postgres
      - REDIS_HOST=redis
      - ML_SERVICE_URL=http://ml-service:8000
      - NF_SERVICE_URL=http://nf-service:8000
      - NODE_ENV=production
      - NODE_OPTIONS=--max-old-space-size=4096
      # Always use volume path so .env cannot override with ./data/... (which is not mounted)
      - GEOIP_DATABASE_PATH=/app/geoip/GeoLite2-City.mmdb
      - GEOIP_MAXMIND_ACCOUNT_ID=${GEOIP_MAXMIND_ACCOUNT_ID}
      - GEOIP_MAXMIND_LICENSE_KEY=${GEOIP_MAXMIND_LICENSE_KEY}
    volumes:
      - /data/parkfan/geoip:/app/geoip
      - /data/parkfan/logs:/app/logs
    ports:
      - "${PORT:-3000}:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      ml-service:
        condition: service_healthy
    networks:
      - parkfan-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    labels:
      - "coolify.managed=true"
      - "coolify.version=1.0.0"
      - "coolify.type=application"
      - "coolify.healthcheck.enabled=true"
      - "coolify.healthcheck.path=/v1/health"
      - "coolify.healthcheck.port=3000"
      - "coolify.healthcheck.interval=30s"
      - "coolify.healthcheck.timeout=10s"
      - "coolify.healthcheck.retries=3"

  bull-board:
    image: venatum/bull-board:latest
    restart: unless-stopped
    ports:
      - "3001:3000"
    environment:
      REDIS_HOST: redis
      REDIS_PORT: ${REDIS_PORT:-6379}
      REDIS_DB: '0'
      REDIS_PASSWORD: ''
      REDIS_USE_TLS: 'false'
      REDIS_FAMILY: 4
      BULL_PREFIX: ${BULL_PREFIX:-parkfan}
      BULL_VERSION: BULL
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - parkfan-network
    labels:
      - "coolify.managed=true"
      - "coolify.version=1.0.0"
      - "coolify.type=monitoring"

networks:
  parkfan-network:
    driver: bridge
